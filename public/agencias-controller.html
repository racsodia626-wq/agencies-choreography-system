<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AGENCIAS — Sistema de Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00D4FF;
    --cyan-dim: rgba(0, 212, 255, 0.15);
    --cyan-glow: rgba(0, 212, 255, 0.4);
    --dark: #050810;
    --danger: #FF3366;
    --success: #00FF88;
  }

  body {
    background: var(--dark);
    color: white;
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* CAMERA */
  #camera-feed {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #camera-feed.active { opacity: 1; }

  /* SCAN LINE OVERLAY */
  .scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  /* VIGNETTE */
  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5,8,16,0.85) 100%);
    pointer-events: none;
    z-index: 3;
  }

  /* START SCREEN */
  #start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: var(--dark);
    transition: opacity 0.5s ease;
  }

  #start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .start-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(3rem, 12vw, 7rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: white;
    text-shadow: 0 0 40px var(--cyan-glow);
  }

  .start-subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--cyan);
    margin-top: 0.5rem;
    margin-bottom: 3rem;
    opacity: 0.8;
  }

  .start-btn {
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    padding: 1rem 2.5rem;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .start-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: var(--cyan-dim);
    transition: left 0.3s ease;
  }

  .start-btn:hover::before { left: 0; }
  .start-btn:hover {
    box-shadow: 0 0 20px var(--cyan-glow);
    color: white;
  }

  /* HUD TOP */
  #hud-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 1rem 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(5,8,16,0.9), transparent);
  }

  .hud-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--cyan);
  }

  .hud-status {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--cyan);
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* LAST COMMAND DISPLAY */
  #last-command {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 8;
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(3rem, 15vw, 8rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    color: white;
    text-shadow: 0 0 30px var(--cyan), 0 0 60px var(--cyan-glow);
    opacity: 0;
    transition: opacity 0.1s ease;
    pointer-events: none;
    text-align: center;
  }

  #last-command.flash {
    animation: cmd-flash 1.2s ease forwards;
  }

  @keyframes cmd-flash {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    70% { opacity: 0.8; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
  }

  /* COMMAND BUTTONS AREA */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 1.5rem 1rem 2rem;
    background: linear-gradient(to top, rgba(5,8,16,0.95), transparent);
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .cmd-row {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
  }

  .cmd-btn {
    flex: 1;
    max-width: 160px;
    padding: 1rem 0.5rem;
    background: rgba(5, 8, 16, 0.7);
    border: 1px solid rgba(0, 212, 255, 0.3);
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.15s ease;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .cmd-btn .cmd-key {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--cyan);
    opacity: 0.6;
    letter-spacing: 0.1em;
  }

  .cmd-btn::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 2px;
    background: var(--cyan);
    transform: scaleX(0);
    transition: transform 0.15s ease;
  }

  .cmd-btn:active,
  .cmd-btn.firing {
    background: var(--cyan-dim);
    border-color: var(--cyan);
    box-shadow: 0 0 20px var(--cyan-glow), inset 0 0 15px var(--cyan-dim);
    transform: scale(0.97);
  }

  .cmd-btn.firing::before { transform: scaleX(1); }

  /* CORNER BRACKETS */
  .cmd-btn::after {
    content: '';
    position: absolute;
    top: 4px; right: 4px;
    width: 8px; height: 8px;
    border-top: 1px solid var(--cyan);
    border-right: 1px solid var(--cyan);
    opacity: 0.4;
  }

  /* BLANK / SILENCIO button */
  .cmd-btn.blank {
    border-color: rgba(255, 51, 102, 0.3);
    color: rgba(255, 255, 255, 0.5);
  }

  .cmd-btn.blank:active,
  .cmd-btn.blank.firing {
    background: rgba(255, 51, 102, 0.1);
    border-color: var(--danger);
    box-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
  }

  .cmd-btn.blank::after {
    border-color: var(--danger);
  }

  /* FEEDBACK TICKER */
  #ticker {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    z-index: 20;
  }

  #ticker.run {
    animation: ticker-run 0.8s ease forwards;
  }

  @keyframes ticker-run {
    0% { transform: scaleX(0); opacity: 1; }
    70% { transform: scaleX(1); opacity: 1; }
    100% { transform: scaleX(1); opacity: 0; }
  }

  /* CORNER DECORATION */
  .corner {
    position: fixed;
    width: 20px; height: 20px;
    z-index: 9;
    opacity: 0.4;
  }
  .corner.tl { top: 60px; left: 12px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner.tr { top: 60px; right: 12px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
</style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>

<!-- START SCREEN -->
<div id="start-screen">
  <div class="start-title">AGENCIAS</div>
  <div class="start-subtitle">SISTEMA DE CONTROL — v0.2</div>
  <button class="start-btn" onclick="initCamera()">▶ INICIAR SISTEMA</button>
</div>

<!-- HUD -->
<div id="hud-top">
  <div class="hud-title">AGENCIAS</div>
  <div class="hud-status">
    <div class="status-dot"></div>
    <span id="status-text">EN VIVO</span>
  </div>
</div>

<!-- COMMAND FLASH -->
<div id="last-command"></div>

<!-- CONTROLS -->
<div id="controls">
  <div class="cmd-row">
    <button class="cmd-btn" onclick="fireCommand('CAMINA')">
      CAMINA
      <span class="cmd-key">[ CMD 01 ]</span>
    </button>
    <button class="cmd-btn" onclick="fireCommand('SALTA')">
      SALTA
      <span class="cmd-key">[ CMD 02 ]</span>
    </button>
    <button class="cmd-btn" onclick="fireCommand('AGÁCHATE')">
      AGÁCHATE
      <span class="cmd-key">[ CMD 03 ]</span>
    </button>
  </div>
  <div class="cmd-row">
    <button class="cmd-btn blank" onclick="fireCommand('', true)">
      — SILENCIO —
      <span class="cmd-key">[ SIN COMANDO ]</span>
    </button>
  </div>
</div>

<div id="ticker"></div>

<script>
  const synth = window.speechSynthesis;
  let voices = [];
  let cameraReady = false;

  // Load voices
  function loadVoices() {
    voices = synth.getVoices();
  }
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }

  // Init camera
  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      const video = document.getElementById('camera-feed');
      video.srcObject = stream;
      video.classList.add('active');
      cameraReady = true;

      // Hide start screen
      document.getElementById('start-screen').classList.add('hidden');

      // Try to get Spanish voice
      loadVoices();
    } catch(e) {
      // Fallback: just hide start screen without camera
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('status-text').textContent = 'SIN CÁMARA';
    }
  }

  // Fire command
  function fireCommand(text, isSilence = false) {
    const btn = event.currentTarget;

    // Visual feedback on button
    btn.classList.add('firing');
    setTimeout(() => btn.classList.remove('firing'), 300);

    // Ticker animation
    const ticker = document.getElementById('ticker');
    ticker.classList.remove('run');
    void ticker.offsetWidth;
    ticker.classList.add('run');

    if (isSilence) {
      // Flash empty
      showFlash('—');
      return;
    }

    // Show command flash on screen
    showFlash(text);

    // Speak command
    speakCommand(text);
  }

  function showFlash(text) {
    const el = document.getElementById('last-command');
    el.textContent = text;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  function speakCommand(text) {
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'es-ES';
    utter.rate = 0.85;
    utter.pitch = 0.9;
    utter.volume = 1;

    // Try to find Spanish voice
    const spanishVoice = voices.find(v =>
      v.lang.startsWith('es') && (v.name.includes('Google') || v.name.includes('Microsoft'))
    ) || voices.find(v => v.lang.startsWith('es'));

    if (spanishVoice) utter.voice = spanishVoice;
    synth.speak(utter);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (!cameraReady) return;
    const map = { '1': 'CAMINA', '2': 'SALTA', '3': 'AGÁCHATE' };
    if (map[e.key]) {
      showFlash(map[e.key]);
      speakCommand(map[e.key]);
    }
    if (e.key === '0') showFlash('—');
  });

  // Prevent sleep on mobile
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AGENCIAS — Control</title>
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; touch-action: manipulation; }
:root {
  --cyan: #00D4FF;
  --cyan-dim: rgba(0,212,255,0.12);
  --cyan-glow: rgba(0,212,255,0.4);
  --dark: #050810;
  --success: #00FF88;
  --danger: #FF3366;
  --orange: #FFB800;
  --purple: #AA88FF;
}
body {
  background: var(--dark);
  font-family: 'Share Tech Mono', monospace;
  height: 100vh;
  overflow: hidden;
  color: white;
  position: relative;
}
.scanlines {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  pointer-events: none; z-index: 2;
}
.vignette {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(5,8,16,0.7) 100%);
  pointer-events: none; z-index: 3;
}

/* SETUP SCREEN */
#setup-screen {
  position: fixed; top:0; left:0; width:100%; height:100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; background: var(--dark);
  gap: 1.2rem; padding: 2rem; text-align: center;
  transition: opacity 0.4s ease;
}
#setup-screen.hidden { opacity:0; pointer-events:none; }
.title {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(2.5rem, 10vw, 4rem);
  font-weight: 700; letter-spacing: 0.2em;
  color: white; text-shadow: 0 0 30px var(--cyan-glow);
}
.subtitle { font-size:0.65rem; letter-spacing:0.3em; color:rgba(0,212,255,0.6); }
.role-badge {
  border: 1px solid var(--cyan); padding: 0.5rem 1.5rem;
  font-size: 0.65rem; letter-spacing: 0.25em; color: var(--cyan);
}
.code-input-wrap {
  display: flex; flex-direction: column; gap: 0.5rem; width: 100%; max-width: 280px;
}
.code-input-label { font-size:0.6rem; letter-spacing:0.2em; color:rgba(0,212,255,0.5); text-align:left; }
#room-input {
  background: rgba(0,212,255,0.05);
  border: 1px solid rgba(0,212,255,0.3);
  color: white; font-family: 'Share Tech Mono', monospace;
  font-size: 1.4rem; letter-spacing: 0.3em;
  padding: 0.8rem 1rem; text-align: center; text-transform: uppercase;
  width: 100%; outline: none;
}
#room-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan-dim); }
.connect-btn {
  background: transparent; border: 1px solid var(--cyan);
  color: var(--cyan); font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem; letter-spacing: 0.2em;
  padding: 0.9rem 2rem; cursor: pointer; transition: all 0.2s;
  width: 100%; max-width: 280px;
}
.connect-btn:hover { background: rgba(0,212,255,0.1); color: white; }
.skip-btn {
  background: transparent; border: none;
  color: rgba(255,255,255,0.2); font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.15em;
  cursor: pointer; text-decoration: underline;
}

/* VIDEO BACKGROUND */
#remote-video {
  position: fixed; top:0; left:0; width:100%; height:100%;
  object-fit: cover; z-index: 1;
  opacity: 0; transition: opacity 0.6s ease;
}
#remote-video.active { opacity: 1; }

/* NO VIDEO PLACEHOLDER */
#no-video {
  position: fixed; top:0; left:0; width:100%; height:100%;
  z-index: 1; display: flex; align-items: center; justify-content: center;
}
.no-video-text {
  font-size: 0.6rem; letter-spacing: 0.25em;
  color: rgba(0,212,255,0.2); text-align: center;
}

/* HUD TOP */
#hud-top {
  position: fixed; top:0; left:0; right:0; z-index: 10;
  padding: 0.8rem 1.2rem;
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(to bottom, rgba(5,8,16,0.9), transparent);
}
.hud-title {
  font-family: 'Rajdhani', sans-serif; font-size: 1rem;
  font-weight: 700; letter-spacing: 0.2em; color: var(--cyan);
}
.hud-status {
  font-size: 0.6rem; letter-spacing: 0.12em;
  color: rgba(255,255,255,0.4);
  display: flex; align-items: center; gap: 0.4rem;
}
.dot { width:6px; height:6px; border-radius:50%; background:var(--cyan); animation:pulse 2s infinite; }
.dot.live { background:var(--success); box-shadow:0 0 6px var(--success); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* COMMAND FLASH */
#cmd-flash {
  position: fixed; top:45%; left:50%;
  transform: translate(-50%,-50%);
  z-index: 8; pointer-events: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(2.5rem, 12vw, 6rem);
  font-weight: 700; letter-spacing: 0.1em;
  color: white; text-shadow: 0 0 30px var(--cyan), 0 0 60px var(--cyan-glow);
  opacity: 0; text-align: center; white-space: nowrap;
}
#cmd-flash.flash { animation: cmd-anim 1s ease forwards; }
@keyframes cmd-anim {
  0% { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
  30% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-50%) scale(0.95); }
}

/* TONE INDICATOR */
#tone-bar {
  position: fixed; top:0; left:0; right:0; height:3px; z-index:15;
  background: var(--cyan); transform:scaleX(0); transform-origin:left;
  box-shadow: 0 0 8px var(--cyan);
  transition: transform 0.1s ease;
}
#tone-bar.active { transform:scaleX(1); animation: tone-pulse 1s ease infinite; }
@keyframes tone-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* CONTROLS */
#controls {
  position: fixed; bottom:0; left:0; right:0; z-index: 10;
  padding: 0.8rem 1rem 1.2rem;
  background: linear-gradient(to top, rgba(5,8,16,0.97) 60%, transparent);
}

/* DPAD + ACTION layout */
.gamepad-layout {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 0.5rem;
}

/* DPAD */
.dpad {
  display: grid;
  grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(3, 52px);
  gap: 3px;
}
.dpad-btn {
  background: rgba(13,21,37,0.85);
  border: 1px solid rgba(0,212,255,0.25);
  color: white; cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px; border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  transition: all 0.1s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
}
.dpad-btn .arrow { font-size: 1rem; line-height: 1; }
.dpad-center { grid-column: 2; grid-row: 2; background: rgba(0,212,255,0.04); border-color: rgba(0,212,255,0.1); cursor: default; }
.dpad-btn.empty { background: transparent; border: none; pointer-events: none; }

/* Hold behavior */
.dpad-btn.nav-btn:active,
.dpad-btn.nav-btn.holding {
  background: var(--cyan-dim);
  border-color: var(--cyan);
  box-shadow: 0 0 12px var(--cyan-glow);
  transform: scale(0.95);
}

/* ACTION BUTTONS */
.action-grid {
  display: grid;
  grid-template-columns: repeat(2, 58px);
  grid-template-rows: repeat(2, 58px);
  gap: 6px;
}
.action-btn {
  border-radius: 50%;
  background: rgba(13,21,37,0.85);
  border: 1px solid rgba(255,255,255,0.15);
  color: white; cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.6rem; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  transition: all 0.1s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.action-btn .icon { font-size: 1.1rem; line-height: 1; }
.action-btn.salta { border-color: rgba(0,255,136,0.4); color: var(--success); }
.action-btn.agachate { border-color: rgba(255,184,0,0.4); color: var(--orange); }
.action-btn.rodar { border-color: rgba(170,136,255,0.4); color: var(--purple); }
.action-btn.stop { border-color: rgba(255,51,102,0.4); color: var(--danger); }

.action-btn:active {
  transform: scale(0.93);
  box-shadow: 0 0 15px currentColor;
}
.action-btn.salta:active { background: rgba(0,255,136,0.1); border-color: var(--success); }
.action-btn.agachate:active { background: rgba(255,184,0,0.1); border-color: var(--orange); }
.action-btn.rodar:active { background: rgba(170,136,255,0.1); border-color: var(--purple); }
.action-btn.stop:active { background: rgba(255,51,102,0.1); border-color: var(--danger); }
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="vignette"></div>
<div id="tone-bar"></div>

<!-- SETUP -->
<div id="setup-screen">
  <div class="title">AGENCIAS</div>
  <div class="subtitle">SISTEMA DE CONTROL — v0.4</div>
  <div class="role-badge">DISPOSITIVO: CONTROLADOR</div>
  <div class="code-input-wrap">
    <div class="code-input-label">CÓDIGO DE SALA (de la cámara)</div>
    <input id="room-input" type="text" maxlength="5" placeholder="xxxxx" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" style="text-transform:lowercase"/>
  </div>
  <button class="connect-btn" onclick="connectToCamera()">▶ CONECTAR</button>
  <button class="skip-btn" onclick="skipCamera()">continuar sin cámara</button>
</div>

<!-- VIDEO -->
<video id="remote-video" autoplay playsinline></video>
<div id="no-video">
  <div class="no-video-text">SIN CÁMARA<br>MODO SOLO AUDIO</div>
</div>

<!-- HUD -->
<div id="hud-top">
  <div class="hud-title">AGENCIAS</div>
  <div class="hud-status">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-text">DESCONECTADO</span>
  </div>
</div>

<!-- CMD FLASH -->
<div id="cmd-flash"></div>

<!-- CONTROLS -->
<div id="controls">
  <div class="gamepad-layout">

    <!-- DPAD -->
    <div class="dpad">
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn nav-btn" id="btn-avanza"
        ontouchstart="startHold('AVANZA', this)" ontouchend="stopHold()"
        onmousedown="startHold('AVANZA', this)" onmouseup="stopHold()">
        <span class="arrow">↑</span>
        <span>AVANZA</span>
      </button>
      <div class="dpad-btn empty"></div>

      <button class="dpad-btn nav-btn" id="btn-izq"
        ontouchstart="startHold('GIRA IZQ', this)" ontouchend="stopHold()"
        onmousedown="startHold('GIRA IZQ', this)" onmouseup="stopHold()">
        <span class="arrow">←</span>
        <span>IZQ</span>
      </button>
      <div class="dpad-btn dpad-center">
        <span style="font-size:0.5rem; color:rgba(0,212,255,0.3); letter-spacing:0.1em">AGS</span>
      </div>
      <button class="dpad-btn nav-btn" id="btn-der"
        ontouchstart="startHold('GIRA DER', this)" ontouchend="stopHold()"
        onmousedown="startHold('GIRA DER', this)" onmouseup="stopHold()">
        <span class="arrow">→</span>
        <span>DER</span>
      </button>

      <div class="dpad-btn empty"></div>
      <button class="dpad-btn nav-btn" id="btn-retro"
        ontouchstart="startHold('RETROCEDE', this)" ontouchend="stopHold()"
        onmousedown="startHold('RETROCEDE', this)" onmouseup="stopHold()">
        <span class="arrow">↓</span>
        <span>RETRO</span>
      </button>
      <div class="dpad-btn empty"></div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="action-grid">
      <button class="action-btn salta" ontouchstart="fireAction('SALTA', '#00FF88')" onmousedown="fireAction('SALTA', '#00FF88')">
        <span class="icon">⬆</span>
        <span>SALTA</span>
      </button>
      <button class="action-btn agachate" ontouchstart="fireAction('AGÁCHATE', '#FFB800')" onmousedown="fireAction('AGÁCHATE', '#FFB800')">
        <span class="icon">⬇</span>
        <span>AGÁCHATE</span>
      </button>
      <button class="action-btn rodar" ontouchstart="fireAction('RODAR', '#AA88FF')" onmousedown="fireAction('RODAR', '#AA88FF')">
        <span class="icon">↺</span>
        <span>RODAR</span>
      </button>
      <button class="action-btn stop" ontouchstart="fireAction('STOP', '#FF3366')" onmousedown="fireAction('STOP', '#FF3366')">
        <span class="icon">■</span>
        <span>STOP</span>
      </button>
    </div>

  </div>
</div>

<script>
const synth = window.speechSynthesis;
let voices = [];
let peer, conn;
let holdInterval = null;
let toneCtx = null;
let toneNode = null;
let toneGain = null;
let activeBtn = null;

// Load voices
function loadVoices() { voices = synth.getVoices(); }
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

// Audio context for continuous tone
function initAudio() {
  if (toneCtx) return;
  toneCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function startTone(freq = 80) {
  initAudio();
  if (toneNode) return;
  toneGain = toneCtx.createGain();
  toneGain.gain.setValueAtTime(0, toneCtx.currentTime);
  toneGain.gain.linearRampToValueAtTime(0.3, toneCtx.currentTime + 0.1);
  toneNode = toneCtx.createOscillator();
  toneNode.type = 'sine';
  toneNode.frequency.value = freq;
  toneNode.connect(toneGain);
  toneGain.connect(toneCtx.destination);
  toneNode.start();
  document.getElementById('tone-bar').classList.add('active');
}

function stopTone() {
  if (!toneNode) return;
  toneGain.gain.linearRampToValueAtTime(0, toneCtx.currentTime + 0.15);
  setTimeout(() => {
    if (toneNode) { toneNode.stop(); toneNode = null; toneGain = null; }
  }, 200);
  document.getElementById('tone-bar').classList.remove('active');
}

function playSound(type) {
  initAudio();
  const ctx = toneCtx;
  const g = ctx.createGain();
  g.connect(ctx.destination);

  if (type === 'poing') {
    // Jump sound - ascending poing
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.4, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.connect(g); osc.start(); osc.stop(ctx.currentTime + 0.3);

  } else if (type === 'tick') {
    // Crouch sound - descending tick
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.12);
    g.gain.setValueAtTime(0.35, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
    osc.connect(g); osc.start(); osc.stop(ctx.currentTime + 0.2);

  } else if (type === 'roll') {
    // Roll sound - rumble
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/data.length, 2);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    g.gain.setValueAtTime(0.4, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    src.connect(g); src.start();

  } else if (type === 'stop') {
    // Stop - sharp cut
    const osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
    osc.connect(g); osc.start(); osc.stop(ctx.currentTime + 0.08);

  } else if (type === 'click') {
    // Direction click
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.06);
    osc.connect(g); osc.start(); osc.stop(ctx.currentTime + 0.06);
  }
}

// Navigation hold commands (AVANZA, RETROCEDE, GIRA)
function startHold(cmd, btn) {
  initAudio();
  if (holdInterval) return;
  activeBtn = btn;
  btn.classList.add('holding');

  // Say command once
  speak(cmd);

  // Start tone
  const freq = (cmd === 'RETROCEDE') ? 120 : 80;
  startTone(freq);

  // Click for directions
  if (cmd.includes('GIRA')) playSound('click');

  // Show flash
  showFlash(cmd, '#00D4FF');
}

function stopHold() {
  if (holdInterval) { clearInterval(holdInterval); holdInterval = null; }
  if (activeBtn) { activeBtn.classList.remove('holding'); activeBtn = null; }
  stopTone();
}

// Action commands (SALTA, AGACHATE, RODAR, STOP)
function fireAction(cmd, color) {
  initAudio();
  speak(cmd);
  showFlash(cmd, color);

  if (cmd === 'SALTA') playSound('poing');
  else if (cmd === 'AGÁCHATE') playSound('tick');
  else if (cmd === 'RODAR') playSound('roll');
  else if (cmd === 'STOP') { playSound('stop'); stopTone(); }
}

function showFlash(text, color = '#00D4FF') {
  const el = document.getElementById('cmd-flash');
  el.textContent = text;
  el.style.color = color;
  el.style.textShadow = `0 0 30px ${color}, 0 0 60px ${color}40`;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function speak(text) {
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'es-ES';
  utter.rate = 0.85;
  utter.pitch = 0.9;
  utter.volume = 1;
  const v = voices.find(v => v.lang.startsWith('es') && v.name.includes('Google'))
         || voices.find(v => v.lang.startsWith('es'));
  if (v) utter.voice = v;
  synth.speak(utter);
}

// PeerJS connection
function showRemoteStream(stream) {
  if (document.getElementById('setup-screen').classList.contains('hidden')) return;
  console.log('Showing remote stream, tracks:', stream.getTracks().length);
  const video = document.getElementById('remote-video');
  video.srcObject = stream;
  video.play().catch(e => console.error('Video play:', e));
  video.classList.add('active');
  document.getElementById('no-video').style.display = 'none';
  document.getElementById('conn-dot').classList.add('live');
  document.getElementById('conn-text').textContent = 'CÁMARA EN VIVO';
  document.getElementById('setup-screen').classList.add('hidden');
}

function connectToCamera() {
  const code = document.getElementById('room-input').value.trim().toLowerCase();
  if (!code || code.length < 3) { alert('Ingresa el código de la cámara'); return; }

  // Init audio on direct user interaction
  initAudio();

  document.getElementById('conn-text').textContent = 'INICIANDO...';

  if (peer) { try { peer.destroy(); } catch(e){} peer = null; }

  peer = new Peer({
    host: '0.peerjs.com',
    port: 443,
    path: '/',
    secure: true,
    debug: 1,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        {
          urls: 'turn:a.relay.metered.ca:80',
          username: '53a9857b1f8305801b737ca3',
          credential: 'UT9byJl/o7k4t9k6'
        },
        {
          urls: 'turn:a.relay.metered.ca:443',
          username: '53a9857b1f8305801b737ca3',
          credential: 'UT9byJl/o7k4t9k6'
        },
        {
          urls: 'turn:a.relay.metered.ca:443?transport=tcp',
          username: '53a9857b1f8305801b737ca3',
          credential: 'UT9byJl/o7k4t9k6'
        },
        {
          urls: 'turn:a.relay.metered.ca:80?transport=tcp',
          username: '53a9857b1f8305801b737ca3',
          credential: 'UT9byJl/o7k4t9k6'
        }
      ]
    }
  });

  peer.on('open', (id) => {
    console.log('Peer open:', id);
    document.getElementById('conn-text').textContent = 'LLAMANDO CÁMARA...';

    const dest = toneCtx.createMediaStreamDestination();
    const silentStream = dest.stream;
    const call = peer.call('agencias-cam-' + code, silentStream);

    if (!call) {
      document.getElementById('conn-text').textContent = 'ERROR — CÓDIGO INVÁLIDO';
      console.error('Call null — bad code?');
      return;
    }

    console.log('Calling: agencias-cam-' + code);

    call.on('stream', remoteStream => {
      console.log('Stream received via PeerJS!');
      showRemoteStream(remoteStream);
    });

    // Fallback: RTCPeerConnection track event
    setTimeout(() => {
      try {
        if (call.peerConnection) {
          call.peerConnection.ontrack = (event) => {
            console.log('Track received via RTC!', event.streams);
            if (event.streams && event.streams[0]) showRemoteStream(event.streams[0]);
          };
          const receivers = call.peerConnection.getReceivers();
          console.log('Receivers:', receivers.length);
          if (receivers.length > 0) {
            const stream = new MediaStream(receivers.map(r => r.track).filter(Boolean));
            if (stream.getTracks().length > 0) {
              console.log('Building stream from receivers');
              showRemoteStream(stream);
            }
          }
        }
      } catch(e) { console.error('Fallback error:', e); }
    }, 1000);

    call.on('error', e => {
      document.getElementById('conn-text').textContent = 'ERROR: ' + e.type;
      console.error('Call error:', e);
    });

    call.on('close', () => {
      document.getElementById('conn-text').textContent = 'CÁMARA DESCONECTADA';
    });

    setTimeout(() => {
      if (!document.getElementById('setup-screen').classList.contains('hidden')) {
        document.getElementById('conn-text').textContent = 'SIN RESPUESTA — VERIFICA CÓDIGO';
        console.warn('Timeout — no stream');
      }
    }, 15000);
  });

  peer.on('error', e => {
    document.getElementById('conn-text').textContent = 'ERROR: ' + e.type;
    console.error('Peer error:', e.type, e);
  });
}

function skipCamera() {
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('conn-text').textContent = 'SIN CÁMARA';
}

// Prevent screen sleep
if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});

// Prevent context menu on long press
document.addEventListener('contextmenu', e => e.preventDefault());

// Prevent pinch zoom
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

document.addEventListener('touchstart', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
</script>
</body>

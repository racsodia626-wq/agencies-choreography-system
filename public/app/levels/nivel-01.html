<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AGENCIAS — Nivel 01</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --cyan:#00D4FF; --dark:#050810; --success:#00FF88; --warn:#FFB800; }

body {
  background:var(--dark); font-family:'Share Tech Mono',monospace;
  height:100vh; overflow:hidden; color:white;
}

#performer-video {
  position:fixed; top:0; left:0; width:100%; height:100%;
  object-fit:cover; z-index:0;
}

.scanlines {
  position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
  pointer-events:none; z-index:1;
}

/* ── CONNECT ── */
#connect-screen {
  position:fixed; inset:0; z-index:100;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:1.4rem;
  background:var(--dark);
}
.title { font-family:'Rajdhani',sans-serif; font-size:clamp(2rem,8vw,3rem); font-weight:700; letter-spacing:.2em; text-shadow:0 0 30px rgba(0,212,255,.5); }
.badge  { border:1px solid var(--cyan); padding:.4rem 1.2rem; font-size:.65rem; letter-spacing:.3em; color:var(--cyan); }
.lbl    { font-size:.6rem; letter-spacing:.2em; color:rgba(0,212,255,.4); }
#room-input {
  background:transparent; border:1px solid rgba(0,212,255,.4);
  color:var(--cyan); font-family:'Share Tech Mono',monospace;
  font-size:1.5rem; letter-spacing:.4em; text-align:center;
  padding:.6rem 1rem; width:180px; text-transform:lowercase; outline:none;
}
#room-input:focus { border-color:var(--cyan); }
.btn-main {
  background:transparent; border:1px solid var(--cyan); color:var(--cyan);
  font-family:'Share Tech Mono',monospace; font-size:.85rem; letter-spacing:.2em;
  padding:.9rem 2rem; cursor:pointer; transition:background .2s;
}
.btn-main:hover { background:rgba(0,212,255,.1); }
#connect-status { font-size:.6rem; letter-spacing:.15em; color:rgba(255,255,255,.4); min-height:1em; }

/* ── WAITING OVERLAY ── */
#waiting-overlay {
  position:fixed; inset:0; z-index:50;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:2rem;
  background:rgba(5,8,16,.55);
  transition:opacity .4s;
}
#waiting-overlay.on { display:flex; }
#waiting-text {
  font-size:.7rem; letter-spacing:.25em; color:rgba(0,212,255,.7);
  text-align:center; padding:0 2rem; line-height:2;
  animation:wait-blink 2s ease-in-out infinite;
}
@keyframes wait-blink { 0%,100%{ opacity:.7; } 50%{ opacity:.3; } }
#waiting-manual {
  display:none; background:transparent; border:1px solid rgba(0,212,255,.3);
  color:rgba(0,212,255,.5); font-family:'Share Tech Mono',monospace;
  font-size:.65rem; letter-spacing:.2em; padding:.6rem 1.5rem; cursor:pointer;
}

/* ── TUTORIAL (FASE 1) ── */
#tutorial-screen { position:fixed; inset:0; z-index:40; display:none; }

/* HUD */
#hud {
  position:fixed; top:1rem; right:1rem; z-index:60;
  display:flex; align-items:center; gap:.4rem;
  font-size:.55rem; letter-spacing:.15em; color:rgba(255,255,255,.3);
}
#bd-dot { width:7px; height:7px; border-radius:50%; background:#444; }
#bd-dot.active { background:var(--success); box-shadow:0 0 6px var(--success); }

/* Current command */
#current-cmd {
  position:fixed; top:1.2rem; left:50%; transform:translateX(-50%);
  z-index:60; text-align:center; pointer-events:none;
}
#cmd-text {
  font-family:'Rajdhani',sans-serif; font-size:clamp(2rem,8vw,4rem);
  font-weight:700; letter-spacing:.15em;
  color:white; text-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,212,255,.3);
}
#cmd-sub { font-size:.55rem; letter-spacing:.2em; color:rgba(0,212,255,.4); margin-top:.2rem; }

/* Face warning */
#face-warning {
  position:fixed; top:22%; left:50%; transform:translateX(-50%);
  z-index:61; display:none;
  font-size:.65rem; letter-spacing:.2em; color:var(--warn);
  background:rgba(5,8,16,.8); padding:.4rem 1rem; border:1px solid rgba(255,184,0,.3);
}

/* ── OBSTACLES (CSS divs) ── */
#obstacles-layer { position:fixed; inset:0; z-index:45; pointer-events:none; }
.obs { position:absolute; display:none; }
.obs.on { display:block; }

/* Pulsing dot */
.dot-pulse {
  width:22px; height:22px; border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 14px var(--cyan),0 0 35px rgba(0,212,255,.5);
  animation:dot-p 1s ease-in-out infinite;
}
@keyframes dot-p {
  0%,100%{ transform:scale(1); box-shadow:0 0 14px var(--cyan),0 0 35px rgba(0,212,255,.5); }
  50%    { transform:scale(1.45); box-shadow:0 0 22px var(--cyan),0 0 55px rgba(0,212,255,.7); }
}

/* Dot containers */
#obs-top    { top:0;   left:0; right:0; height:22%; display:none; align-items:flex-start; justify-content:center; padding-top:13%; }
#obs-top.on { display:flex; }
#obs-bottom { bottom:0; left:0; right:0; height:22%; display:none; align-items:flex-end; justify-content:center; padding-bottom:12%; }
#obs-bottom.on { display:flex; }
#obs-left   { top:0; left:0; bottom:0; width:18%; display:none; align-items:center; justify-content:flex-start; padding-left:6%; }
#obs-left.on  { display:flex; }
#obs-right  { top:0; right:0; bottom:0; width:18%; display:none; align-items:center; justify-content:flex-end; padding-right:6%; }
#obs-right.on { display:flex; }

/* Horizontal bars */
#obs-jump {
  left:0; right:0; height:2px; top:75%;
  background:linear-gradient(to right,transparent,var(--cyan),var(--cyan),transparent);
  box-shadow:0 0 10px var(--cyan);
  animation:bar-p 1.2s ease-in-out infinite;
}
#obs-crouch {
  left:0; right:0; height:2px; top:25%;
  background:linear-gradient(to right,transparent,var(--cyan),var(--cyan),transparent);
  box-shadow:0 0 10px var(--cyan);
  animation:bar-p 1.2s ease-in-out infinite;
}
@keyframes bar-p { 0%,100%{ opacity:.5; } 50%{ opacity:1; } }

/* Pillars */
#obs-pillar-l {
  top:0; left:0; bottom:0; width:37.5%;
  background:linear-gradient(to bottom,transparent,rgba(0,212,255,.1) 30%,rgba(0,212,255,.1) 70%,transparent);
  border-right:1px solid rgba(0,212,255,.4);
  animation:pillar-p 1.2s ease-in-out infinite;
}
#obs-pillar-r {
  top:0; right:0; bottom:0; width:37.5%;
  background:linear-gradient(to bottom,transparent,rgba(0,212,255,.1) 30%,rgba(0,212,255,.1) 70%,transparent);
  border-left:1px solid rgba(0,212,255,.4);
  animation:pillar-p 1.2s ease-in-out infinite;
}
@keyframes pillar-p { 0%,100%{ opacity:.4; } 50%{ opacity:1; } }

/* STOP hold ring */
#stop-wrap {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:61; display:none; flex-direction:column; align-items:center; gap:.8rem;
}
#stop-wrap.on { display:flex; }
.stop-lbl { font-size:.65rem; letter-spacing:.2em; color:var(--cyan); }
#stop-ring {
  width:70px; height:70px; border-radius:50%;
  border:3px solid rgba(0,212,255,.2); border-top-color:var(--cyan);
}
#stop-ring.spin { animation:ring-s 2s linear forwards; }
@keyframes ring-s {
  0%  { transform:rotate(0deg);   border-top-color:var(--cyan); }
  100%{ transform:rotate(360deg); border-top-color:var(--success); }
}

/* ── CONTROLS ── */
#controls {
  position:fixed; bottom:0; left:0; right:0; z-index:55;
  padding:1rem;
  background:linear-gradient(to top,rgba(5,8,16,.88) 60%,transparent);
}
#ctrl-label { text-align:center; font-size:.55rem; letter-spacing:.25em; color:rgba(0,212,255,.3); margin-bottom:.5rem; }
#cmd-buttons { display:flex; justify-content:center; gap:5px; flex-wrap:wrap; }
.cmd-btn {
  font-family:'Share Tech Mono',monospace; font-size:.55rem; letter-spacing:.08em;
  padding:.45rem .5rem; min-width:56px; text-align:center;
  border:1px solid rgba(0,212,255,.12); background:transparent; color:rgba(0,212,255,.2);
  cursor:default; transition:all .3s; user-select:none; -webkit-tap-highlight-color:transparent;
}
.cmd-btn.active {
  border-color:var(--cyan); color:var(--cyan);
  background:rgba(0,212,255,.08); box-shadow:0 0 12px rgba(0,212,255,.3);
  cursor:pointer;
}
.cmd-btn.done {
  border-color:rgba(0,255,136,.4); color:rgba(0,255,136,.6);
  background:rgba(0,255,136,.04);
}

/* Unlock flash */
#unlock-flash {
  position:fixed; inset:0; z-index:70;
  background:rgba(0,255,136,.15); pointer-events:none; opacity:0;
}
#unlock-flash.go { animation:uf .6s ease forwards; }
@keyframes uf { 0%{ opacity:1; } 100%{ opacity:0; } }

/* ── COMPLETE ── */
#complete-screen {
  position:fixed; inset:0; z-index:80;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:1.5rem;
  background:rgba(5,8,16,.92);
}
.complete-title {
  font-family:'Rajdhani',sans-serif; font-size:clamp(2rem,8vw,3.5rem);
  font-weight:700; letter-spacing:.2em; color:var(--success);
  text-shadow:0 0 30px rgba(0,255,136,.5);
}
.complete-sub { font-size:.65rem; letter-spacing:.25em; color:rgba(0,212,255,.5); }
</style>
</head>
<body>

<div class="scanlines"></div>
<video id="performer-video" autoplay playsinline muted></video>

<!-- CONNECT -->
<div id="connect-screen">
  <div class="title">AGENCIAS</div>
  <div class="badge">NIVEL 01 — TUTORIAL</div>
  <div class="lbl">CÓDIGO DE SALA DE LA CÁMARA</div>
  <input id="room-input" type="text" maxlength="5" placeholder="----"
    autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
  <button class="btn-main" onclick="connect()">CONECTAR</button>
  <div id="connect-status"></div>
</div>

<!-- WAITING OVERLAY -->
<div id="waiting-overlay">
  <div id="waiting-text">ESPERANDO QUE EL<br>PERFORMER SE POSICIONE</div>
  <button id="waiting-manual" onclick="onPerformerReady()">▶ CONTINUAR MANUAL</button>
</div>

<!-- TUTORIAL (FASE 1) -->
<div id="tutorial-screen">

  <div id="hud">
    <div id="bd-dot"></div>
    <span>DETECCIÓN</span>
  </div>

  <div id="current-cmd">
    <div id="cmd-text">—</div>
    <div id="cmd-sub">REALIZA EL MOVIMIENTO</div>
  </div>

  <div id="face-warning">PERFORMER: MIRA A LA CÁMARA</div>

  <div id="obstacles-layer">
    <div id="obs-top"    class="obs"><div class="dot-pulse"></div></div>
    <div id="obs-bottom" class="obs"><div class="dot-pulse"></div></div>
    <div id="obs-left"   class="obs"><div class="dot-pulse"></div></div>
    <div id="obs-right"  class="obs"><div class="dot-pulse"></div></div>
    <div id="obs-jump"       class="obs"></div>
    <div id="obs-crouch"     class="obs"></div>
    <div id="obs-pillar-l"   class="obs"></div>
    <div id="obs-pillar-r"   class="obs"></div>
  </div>

  <div id="stop-wrap">
    <div class="stop-lbl">MANTÉN PRESIONADO</div>
    <div id="stop-ring"></div>
  </div>

  <div id="controls">
    <div id="ctrl-label">COMANDOS</div>
    <div id="cmd-buttons"></div>
  </div>

  <div id="unlock-flash"></div>
</div>

<!-- COMPLETE -->
<div id="complete-screen">
  <div class="complete-title">NIVEL 01 COMPLETO</div>
  <div class="complete-sub">TODOS LOS COMANDOS DESBLOQUEADOS</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0/dist/pose-detection.min.js"></script>
<script src="../core/body-detection.js"></script>
<script>

/* ── DEFINICIÓN DE COMANDOS ── */
const CMDS = [
  {
    id: 'AVANZA',
    obs: ['obs-top'],
    requireFacing: false,
    check: kp => hipCenter(kp).cy < 0.25
  },
  {
    id: 'RETROCEDE',
    obs: ['obs-bottom'],
    requireFacing: false,
    check: kp => hipCenter(kp).cy > 0.75
  },
  {
    id: 'GIRA IZQ',
    obs: ['obs-left'],
    requireFacing: false,
    check: kp => hipCenter(kp).cx < 0.2
  },
  {
    id: 'GIRA DER',
    obs: ['obs-right'],
    requireFacing: false,
    check: kp => hipCenter(kp).cx > 0.8
  },
  {
    id: 'SALTA',
    obs: ['obs-jump'],
    requireFacing: true,
    check: kp => kp.leftAnkle.y < 0.65 && kp.rightAnkle.y < 0.65
  },
  {
    id: 'AGÁCHATE',
    obs: ['obs-crouch'],
    requireFacing: true,
    check: kp => kp.nose.y > 0.4
  },
  {
    id: 'RODAR',
    obs: ['obs-pillar-l', 'obs-pillar-r'],
    requireFacing: true,
    check: kp => {
      const cx = hipCenter(kp).cx;
      const sy = (kp.leftShoulder.y + kp.rightShoulder.y) / 2;
      return cx > 0.37 && cx < 0.63 && sy > 0.55;
    }
  },
  {
    id: 'STOP',
    obs: [],
    requireFacing: false,
    check: null
  }
];

function hipCenter(kp) {
  return {
    cx: (kp.leftHip.x + kp.rightHip.x) / 2,
    cy: (kp.leftHip.y + kp.rightHip.y) / 2
  };
}

/* ── ESTADO ── */
let peer, dataConn;
let bdActive   = false;
let currentIdx = -1;
let frames     = 0;
const FRAMES_NEEDED = 8;

let stopTimer  = null;
let stopActive = false;

/* ── CONNECT ── */
function connect() {
  const code = document.getElementById('room-input').value.trim().toLowerCase();
  if (code.length < 3) return;
  setStatus('CONECTANDO...');

  peer = new Peer(undefined, {
    host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 1,
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'turn:a.relay.metered.ca:80',               username: '53a9857b1f8305801b737ca3', credential: 'UT9byJl/o7k4t9k6' },
      { urls: 'turn:a.relay.metered.ca:443',              username: '53a9857b1f8305801b737ca3', credential: 'UT9byJl/o7k4t9k6' },
      { urls: 'turn:a.relay.metered.ca:443?transport=tcp', username: '53a9857b1f8305801b737ca3', credential: 'UT9byJl/o7k4t9k6' },
      { urls: 'turn:a.relay.metered.ca:80?transport=tcp',  username: '53a9857b1f8305801b737ca3', credential: 'UT9byJl/o7k4t9k6' }
    ]}
  });

  peer.on('open', id => {
    console.log('[nivel-01] peer abierto, ID:', id);
    setStatus('LLAMANDO...');

    // data channel
    console.log('[nivel-01] conectando data channel a agencias-cam-' + code);
    dataConn = peer.connect('agencias-cam-' + code);
    dataConn.on('open', () => {
      console.log('[nivel-01] data channel abierto');
      dataConn.on('data', onCameraData);
    });
    dataConn.on('error', e => console.error('[nivel-01] data channel error:', e));

    // dummy stream con un frame de canvas para que PeerJS negocie correctamente
    const canvas = document.createElement('canvas');
    canvas.width = 2; canvas.height = 2;
    canvas.getContext('2d').fillRect(0, 0, 2, 2);
    const dummyStream = canvas.captureStream(1);
    console.log('[nivel-01] llamando a agencias-cam-' + code);

    const call = peer.call('agencias-cam-' + code, dummyStream);
    if (!call) { console.error('[nivel-01] call es null'); setStatus('ERROR: sin llamada'); return; }

    call.on('stream', stream => {
      console.log('[nivel-01] stream recibido, tracks:', stream.getTracks().map(t => t.kind));
      document.getElementById('performer-video').srcObject = stream;
      document.getElementById('connect-screen').style.display = 'none';
      document.getElementById('tutorial-screen').style.display = 'block';
      document.getElementById('waiting-overlay').classList.add('on');

      const video = document.getElementById('performer-video');
      initBodyDetection(video, kp => {
        if (!bdActive) { bdActive = true; document.getElementById('bd-dot').classList.add('active'); }
        onPose(kp);
      });

      setTimeout(() => {
        if (currentIdx === -1)
          document.getElementById('waiting-manual').style.display = 'block';
      }, 15000);
    });

    call.on('error', e => { console.error('[nivel-01] call error:', e); setStatus('ERROR: ' + e.message); });
    call.on('close', () => console.log('[nivel-01] call cerrado'));
    setTimeout(() => {
      if (currentIdx === -1 && document.getElementById('connect-screen').style.display !== 'none')
        console.warn('[nivel-01] sin stream después de 10s — revisar código de sala y que cámara esté activa');
    }, 10000);
  });

  peer.on('error', e => { console.error('[nivel-01] peer error:', e.type, e); setStatus('ERROR: ' + e.type); });
}

function setStatus(t) { document.getElementById('connect-status').textContent = t; }

function onCameraData(raw) {
  try {
    const msg = JSON.parse(raw);
    if (msg.type === 'performer-ready') onPerformerReady();
  } catch(e) {}
}

function onPerformerReady() {
  if (currentIdx !== -1) return; // ya empezó
  const overlay = document.getElementById('waiting-overlay');
  overlay.style.opacity = '0';
  setTimeout(() => {
    overlay.classList.remove('on');
    overlay.style.opacity = '';
    buildButtons();
    advanceTo(0);
  }, 400);
}

function sendCmd(cmd) {
  if (dataConn && dataConn.open)
    dataConn.send(JSON.stringify({ text: cmd.id, color: '#00D4FF', sound: 'tick' }));
}


function buildButtons() {
  const wrap = document.getElementById('cmd-buttons');
  CMDS.forEach(cmd => {
    const btn = document.createElement('button');
    btn.className = 'cmd-btn';
    btn.id = 'btn-' + cmd.id.replace(/\s/g, '-');
    btn.textContent = cmd.id;

    if (cmd.id === 'STOP') {
      btn.addEventListener('pointerdown',  startStop);
      btn.addEventListener('pointerup',    cancelStop);
      btn.addEventListener('pointerleave', cancelStop);
    }

    wrap.appendChild(btn);
  });
}

function advanceTo(idx) {
  if (idx >= CMDS.length) { showComplete(); return; }

  hideObs(currentIdx);
  currentIdx = idx;
  frames = 0;

  const cmd = CMDS[idx];

  document.querySelectorAll('.cmd-btn').forEach((b, i) => {
    b.classList.remove('active');
    if (i < idx) b.classList.add('done');
  });

  const activeBtn = document.getElementById('btn-' + cmd.id.replace(/\s/g, '-'));
  if (activeBtn) activeBtn.classList.add('active');

  document.getElementById('cmd-text').textContent = cmd.id;
  document.getElementById('face-warning').style.display = 'none';

  cmd.obs.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('on'); });

  sendCmd(cmd);
}

function hideObs(idx) {
  if (idx < 0 || idx >= CMDS.length) return;
  CMDS[idx].obs.forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove('on'); });
}

/* ── POSE UPDATE ── */
function onPose(kp) {
  if (currentIdx < 0 || currentIdx >= CMDS.length) return;
  const cmd = CMDS[currentIdx];
  if (!cmd.check) return;

  if (cmd.requireFacing) {
    const ok = kp.nose.score > 0.5;
    document.getElementById('face-warning').style.display = ok ? 'none' : 'block';
    if (!ok) { frames = 0; return; }
  } else {
    document.getElementById('face-warning').style.display = 'none';
  }

  if (cmd.check(kp)) {
    frames++;
    if (frames >= FRAMES_NEEDED) complete();
  } else {
    frames = 0;
  }
}

function complete() {
  frames = 0;
  document.getElementById('face-warning').style.display = 'none';

  const btn = document.getElementById('btn-' + CMDS[currentIdx].id.replace(/\s/g, '-'));
  if (btn) { btn.classList.remove('active'); btn.classList.add('done'); }

  const flash = document.getElementById('unlock-flash');
  flash.classList.remove('go');
  void flash.offsetWidth;
  flash.classList.add('go');

  const next = currentIdx + 1;
  setTimeout(() => advanceTo(next), 650);
}

/* ── STOP HOLD ── */
function startStop() {
  const stopIdx = CMDS.findIndex(c => c.id === 'STOP');
  if (currentIdx !== stopIdx || stopActive) return;
  stopActive = true;

  const ring = document.getElementById('stop-ring');
  document.getElementById('stop-wrap').classList.add('on');
  ring.classList.remove('spin');
  void ring.offsetWidth;
  ring.classList.add('spin');

  stopTimer = setTimeout(() => {
    stopActive = false;
    document.getElementById('stop-wrap').classList.remove('on');
    complete();
  }, 2000);
}

function cancelStop() {
  if (!stopActive) return;
  stopActive = false;
  clearTimeout(stopTimer);
  document.getElementById('stop-wrap').classList.remove('on');
  document.getElementById('stop-ring').classList.remove('spin');
}

/* ── COMPLETE ── */
function showComplete() {
  stopBodyDetection();
  document.getElementById('tutorial-screen').style.display = 'none';
  document.getElementById('complete-screen').style.display = 'flex';
}

document.getElementById('room-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});

</script>
</body>
</html>

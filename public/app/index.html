<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGENCIAS</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #050810;
      color: #00D4FF;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.3em;
      color: #00D4FF;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    .subtitle {
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      letter-spacing: 0.25em;
      color: rgba(0, 212, 255, 0.45);
      text-transform: uppercase;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 320px;
      padding: 0 24px;
    }

    a.btn {
      display: block;
      text-align: center;
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: #00D4FF;
      border: 1px solid rgba(0, 212, 255, 0.4);
      padding: 18px 0;
      background: transparent;
      transition: background 0.15s, border-color 0.15s, text-shadow 0.15s;
    }

    a.btn:hover,
    a.btn:focus {
      background: rgba(0, 212, 255, 0.08);
      border-color: #00D4FF;
      text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
      outline: none;
    }

    a.btn:active {
      background: rgba(0, 212, 255, 0.18);
    }

    footer {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(0, 212, 255, 0.2);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <h1>AGENCIAS</h1>
    <p class="subtitle">sistema coreográfico experimental</p>
  </header>

  <nav>
    <a class="btn" href="levels/nivel-01.html">CONTROLADOR</a>
    <a class="btn" href="core/camera.html">CÁMARA</a>
  </nav>

  <footer>racso cabrera &mdash; 2026</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AGENCIAS — Cámara</title>
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0/dist/pose-detection.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root { --cyan: #00D4FF; --dark: #050810; --success: #00FF88; }
body {
  background: var(--dark);
  font-family: 'Share Tech Mono', monospace;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; color: white;
}
.scanlines {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  pointer-events: none; z-index: 0;
}
#setup-screen {
  z-index: 10; display: flex; flex-direction: column;
  align-items: center; gap: 1.5rem; padding: 2rem; text-align: center;
}
.title {
  font-family: 'Rajdhani', sans-serif; font-size: 2.5rem;
  font-weight: 700; letter-spacing: 0.2em; color: white;
  text-shadow: 0 0 30px rgba(0,212,255,0.5);
}
.subtitle { font-size: 0.65rem; letter-spacing: 0.3em; color: rgba(0,212,255,0.6); }
.role-badge {
  border: 1px solid var(--cyan); padding: 0.5rem 1.5rem;
  font-size: 0.7rem; letter-spacing: 0.3em; color: var(--cyan);
}
.start-btn {
  background: transparent; border: 1px solid var(--cyan);
  color: var(--cyan); font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem; letter-spacing: 0.2em;
  padding: 0.9rem 2rem; cursor: pointer; transition: all 0.2s;
}
.start-btn:hover { background: rgba(0,212,255,0.1); color: white; }
#camera-screen {
  display: none; position: fixed;
  top:0; left:0; width:100%; height:100%; z-index: 5;
}
#local-video { width: 100%; height: 100%; object-fit: cover; }
#conn-dot {
  position: fixed; top: 1rem; right: 1rem; z-index: 20;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan); animation: pulse 2s infinite;
}
#conn-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#code-display {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  padding: 2rem; text-align: center;
  background: linear-gradient(to top, rgba(5,8,16,0.85), transparent);
  transition: opacity .4s;
}
#code-display.hidden { opacity: 0; pointer-events: none; }
.code-value {
  font-family: 'Rajdhani', sans-serif; font-size: 3rem;
  font-weight: 700; letter-spacing: 0.3em; color: white;
  text-shadow: 0 0 20px rgba(0,212,255,0.6);
}

/* FASE 0 — Silhouette */
#sil-overlay {
  position: fixed; inset: 0; z-index: 25;
  display: none; pointer-events: none;
}
#sil-overlay.active { display: block; }
#sil-wrap {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -54%);
  width: min(40vw, 190px);
  transition: opacity .5s;
}
#sil-wrap svg { width: 100%; height: auto; }
#sil-wrap.aligned .sl { stroke: var(--success) !important; transition: stroke .3s; }
#sil-hint {
  position: absolute; bottom: 14%; left: 50%; transform: translateX(-50%);
  font-size: .6rem; letter-spacing: .2em; color: rgba(0,212,255,.6); white-space: nowrap;
}

</style>
</head>
<body>
<div class="scanlines"></div>

<div id="setup-screen">
  <div class="title">AGENCIAS</div>
  <div class="subtitle">SISTEMA DE CONTROL — v0.5</div>
  <div class="role-badge">DISPOSITIVO: CÁMARA / PERFORMER</div>
  <p style="font-size:0.65rem; color:rgba(255,255,255,0.3); max-width:280px; line-height:1.8; letter-spacing:0.05em">
    Este dispositivo transmite la cámara al controlador.<br>
    El performer escucha los comandos aquí.<br>
    Conecta audífonos bluetooth antes de activar.
  </p>
  <button class="start-btn" onclick="startCamera()">▶ ACTIVAR SISTEMA</button>
</div>

<div id="camera-screen">
  <video id="local-video" autoplay playsinline muted></video>

  <!-- FASE 0: silhouette overlay — solo visible para el performer -->
  <div id="sil-overlay">
    <div id="sil-wrap">
      <svg viewBox="0 0 100 230" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="sl" cx="50" cy="18" r="13" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="4 3"/>
        <line   class="sl" x1="50" y1="31" x2="50" y2="45" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="3 3"/>
        <path   class="sl" d="M29 45 Q20 82 22 112 L78 112 Q80 82 71 45 Z" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="4 3"/>
        <path   class="sl" d="M29 51 Q10 76 14 103" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="3 3"/>
        <path   class="sl" d="M71 51 Q90 76 86 103" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="3 3"/>
        <path   class="sl" d="M38 112 Q33 153 31 196" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="4 3"/>
        <path   class="sl" d="M62 112 Q67 153 69 196" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="4 3"/>
      </svg>
    </div>
  </div>

  <div id="conn-dot"></div>
  <div id="code-display">
    <div class="code-value" id="room-code">----</div>
  </div>
</div>

<script src="./body-detection.js"></script>
<script>
let peer, localStream, dataChannel;
const synth = window.speechSynthesis;
let voices = [];
let audioCtx = null;

function loadVoices() { voices = synth.getVoices(); }
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  initAudio();
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  if (type === 'poing') {
    const osc = audioCtx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.15);
    g.gain.setValueAtTime(0.5, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(g); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  } else if (type === 'tick') {
    const osc = audioCtx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.12);
    g.gain.setValueAtTime(0.45, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.connect(g); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
  } else if (type === 'roll') {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/data.length, 2);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    g.gain.setValueAtTime(0.5, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    src.connect(g); src.start();
  } else if (type === 'stop') {
    const osc = audioCtx.createOscillator(); osc.type = 'square';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    g.gain.setValueAtTime(0.4, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
    osc.connect(g); osc.start(); osc.stop(audioCtx.currentTime + 0.08);
  } else if (type === 'tone_start') {
    const osc = audioCtx.createOscillator(); osc.type = 'sine';
    osc.frequency.value = 80;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
    osc.connect(g); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
  } else if (type === 'click') {
    const osc = audioCtx.createOscillator(); osc.type = 'sine';
    osc.frequency.value = 600;
    g.gain.setValueAtTime(0.25, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
    osc.connect(g); osc.start(); osc.stop(audioCtx.currentTime + 0.06);
  }
}

function speak(text) {
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'es-ES'; utter.rate = 0.85; utter.pitch = 0.9; utter.volume = 1;
  const v = voices.find(v => v.lang.startsWith('es') && v.name.includes('Google'))
         || voices.find(v => v.lang.startsWith('es'));
  if (v) utter.voice = v;
  synth.speak(utter);
}

/* ── FASE 0 — posicionamiento del performer ── */
let setupFrames    = 0;
let setupDone      = false;
let pendingReady   = false;
const SETUP_FRAMES = 8;

function startSilhouette() {
  document.getElementById('sil-overlay').classList.add('active');
  const video = document.getElementById('local-video');
  initBodyDetection(video, checkSilhouette);
}

function checkSilhouette(kp) {
  if (setupDone) return;

  // Mínimo 7 de 7 keypoints con score > 0.6
  const all = [kp.nose, kp.leftShoulder, kp.rightShoulder, kp.leftHip, kp.rightHip, kp.leftAnkle, kp.rightAnkle];
  const validCount = all.filter(k => k.score > 0.6).length;
  if (validCount < 7) { resetSil(); return; }

  // Bounding box (nariz → tobillos) debe cubrir ≥ 40% del alto del frame
  const topY    = kp.nose.y;
  const bottomY = Math.max(kp.leftAnkle.y, kp.rightAnkle.y);
  if (bottomY - topY < 0.4) { resetSil(); return; }

  // Centro de caderas dentro del área central
  const cx = (kp.leftHip.x + kp.rightHip.x) / 2;
  const cy = (kp.leftHip.y + kp.rightHip.y) / 2;
  if (cx < 0.25 || cx > 0.75 || cy < 0.25 || cy > 0.75) { resetSil(); return; }

  setupFrames++;
  if (setupFrames === 1) document.getElementById('sil-wrap').classList.add('aligned');
  if (setupFrames >= SETUP_FRAMES) {
    setupDone = true;
    stopBodyDetection();
    document.getElementById('sil-wrap').style.opacity = '0';
    setTimeout(() => document.getElementById('sil-overlay').classList.remove('active'), 500);
    sendPerformerReady();
  }
}

function resetSil() {
  setupFrames = 0;
  document.getElementById('sil-wrap').classList.remove('aligned');
}

function sendPerformerReady() {
  const msg = JSON.stringify({ type: 'performer-ready' });
  if (dataChannel && dataChannel.open) {
    dataChannel.send(msg);
  } else {
    pendingReady = true;
  }
}

function handleCommand(data) {
  initAudio();
  try {
    const cmd = JSON.parse(data);
    if (cmd.text) speak(cmd.text);
    if (cmd.sound) playSound(cmd.sound);
  } catch(e) { console.error('Command parse error:', e); }
}

async function startCamera() {
  // Desbloquear AudioContext y speechSynthesis en el gesto del usuario
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const unlockU = new SpeechSynthesisUtterance(' ');
  unlockU.volume = 0; unlockU.rate = 10;
  synth.speak(unlockU);
  console.log('[audio camera] desbloqueado en gesto de usuario');

  try {
    // Get video stream
    let videoStream;
    try {
      videoStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
    } catch(e) {
      videoStream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
    }

    // Get microphone stream
    let micStream;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch(e) {
      console.warn('No microphone access:', e);
    }

    // Combine video + mic into one stream
    const tracks = [...videoStream.getVideoTracks()];
    if (micStream) tracks.push(...micStream.getAudioTracks());
    localStream = new MediaStream(tracks);

    console.log('Local stream tracks:', localStream.getTracks().map(t => t.kind));

    document.getElementById('local-video').srcObject = videoStream;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('camera-screen').style.display = 'block';
    startSilhouette();

    const code = Math.random().toString(36).substring(2, 7).toLowerCase();
    document.getElementById('room-code').textContent = code;

    peer = new Peer('agencias-cam-' + code, {
      host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 1,
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'turn:a.relay.metered.ca:80', username: '53a9857b1f8305801b737ca3', credential: 'UT9byJl/o7k4t9k6' },
          { urls: 'turn:a.relay.metered.ca:443', username: '53a9857b1f8305801b737ca3', credential: 'UT9byJl/o7k4t9k6' },
          { urls: 'turn:a.relay.metered.ca:443?transport=tcp', username: '53a9857b1f8305801b737ca3', credential: 'UT9byJl/o7k4t9k6' },
          { urls: 'turn:a.relay.metered.ca:80?transport=tcp', username: '53a9857b1f8305801b737ca3', credential: 'UT9byJl/o7k4t9k6' }
        ]
      }
    });

    peer.on('open', () => {});

    peer.on('call', call => {
      call.answer(localStream);
      document.getElementById('conn-dot').classList.add('connected');
      document.getElementById('code-display').classList.add('hidden');
    });

    // Data channel for receiving commands
    peer.on('connection', conn => {
      dataChannel = conn;
      console.log('Data channel connected');
      conn.on('data', handleCommand);
      conn.on('open', () => {
        if (pendingReady) {
          conn.send(JSON.stringify({ type: 'performer-ready' }));
          pendingReady = false;
        }
      });
    });

    peer.on('error', e => console.error(e));

  } catch(e) {
    alert('Error: ' + e.message);
  }
}
</script>
</body>
</html>
